<text x="20.00px" y="51.80px" xml:space="preserve"><tspan xml:space="preserve" fill="#50dc64">$</tspan><tspan xml:space="preserve"> </tspan><tspan xml:space="preserve" fill="#78beff">nikto -host 192.168.122.85</tspan><tspan xml:space="preserve"/></text><text x="20.00px" y="68.60px" xml:space="preserve"><tspan xml:space="preserve">+ Server: Apache/1.3.20 (Unix)  (Red-Hat/Linux) mod_ssl/2.8.4 OpenSSL/0.9.6b</tspan></text><text x="20.00px" y="85.40px" xml:space="preserve"><tspan xml:space="preserve">+ [999984] /: Server may leak inodes via ETags, header found with file /, inode: 34821, size: 2890</tspan></text><text x="20.00px" y="102.20px" xml:space="preserve"><tspan xml:space="preserve">+ [600595] OpenSSL/0.9.6b appears to be outdated (current is at least 3.6.0).</tspan></text><text x="20.00px" y="119.00px" xml:space="preserve"><tspan xml:space="preserve">+ [600511] mod_ssl/2.8.4 appears to be outdated (current is at least 2.9.6). </tspan></text><text x="20.00px" y="135.80px" xml:space="preserve"><tspan xml:space="preserve">+ [600050] Apache/1.3.20 appears to be outdated (current is at least 2.4.66).</tspan></text><text x="20.00px" y="152.60px" xml:space="preserve"><tspan xml:space="preserve">+ [013587] /: Suggested security header missing: permissions-policy.</tspan></text><text x="20.00px" y="169.40px" xml:space="preserve"><tspan xml:space="preserve">+ [013587] /: Suggested security header missing: content-security-policy.</tspan></text><text x="20.00px" y="186.20px" xml:space="preserve"><tspan xml:space="preserve">+ [013587] /: Suggested security header missing: x-content-type-options.</tspan></text><text x="20.00px" y="203.00px" xml:space="preserve"><tspan xml:space="preserve">+ [013587] /: Suggested security header missing: strict-transport-security.</tspan></text><text x="20.00px" y="219.80px" xml:space="preserve"><tspan xml:space="preserve">+ [013587] /: Suggested security header missing: referrer-policy.</tspan></text><text x="20.00px" y="236.60px" xml:space="preserve"><tspan xml:space="preserve">+ [800018] /: Apache/1.3.20 - Apache 1.x up 1.2.34 are vulnerable to a remote DoS and possible code execution.</tspan></text><text x="20.00px" y="253.40px" xml:space="preserve"><tspan xml:space="preserve">+ [800023] /: Apache/1.3.20 - Apache 1.3 below 1.3.29 are vulnerable to overflows in mod_rewrite and mod_cgi.</tspan></text><text x="20.00px" y="270.20px" xml:space="preserve"><tspan xml:space="preserve">+ [800132] /: mod_ssl/2.8.4 - mod_ssl 2.8.7 and lower are vulnerable to a remote buffer overflow which may allow a remote shell.</tspan></text><text x="20.00px" y="287.00px" xml:space="preserve"><tspan xml:space="preserve">+ [000434] /: HTTP TRACE method is active and replies which suggests the host is vulnerable to XST.</tspan></text><text x="20.00px" y="303.80px" xml:space="preserve"><tspan xml:space="preserve">+ [001217] /usage/: Webalizer may be installed.</tspan></text><text x="20.00px" y="320.60px" xml:space="preserve"><tspan xml:space="preserve">+ [750500] /manual/: Directory indexing found.</tspan></text><text x="20.00px" y="337.40px" xml:space="preserve"><tspan xml:space="preserve">+ [002114] /manual/: Web server manual found.</tspan></text><text x="20.00px" y="354.20px" xml:space="preserve"><tspan xml:space="preserve">+ [750500] /icons/: Directory indexing found.</tspan></text><text x="20.00px" y="371.00px" xml:space="preserve"><tspan xml:space="preserve">+ [003584] /icons/README: Apache default file found.</tspan></text><text x="20.00px" y="387.80px" xml:space="preserve"><tspan xml:space="preserve">+ [006425] /test.php: This might be interesting.</tspan></text>
</g>
